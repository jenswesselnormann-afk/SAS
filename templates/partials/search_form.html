<form class="search-form form-grid wide-search">
  <label class="field-label">
    <span>Kilde</span>
  <select name="provider_select">
    <option value="SAS">SAS</option>
    <option value="SkyTeam">SkyTeam (ikke verifisert)</option>
    <option value="Both">SAS + SkyTeam (SkyTeam deaktivert)</option>
  </select>
  </label>
  <input type="hidden" name="provider" value="SAS">
  <label class="field-label">
    <span>Modus</span>
  <select name="mode">
    <option value="route_search">Kalendersøk</option>
    <option value="any_routes">Alle destinasjoner</option>
    <option value="most_hits">Flest hits</option>
  </select>
  </label>
  <div class="combo">
    <input name="origin" placeholder="Fra, f.eks. OSL eller Oslo" required>
    <div class="airport-suggestions"></div>
  </div>
  <div class="combo">
    <input name="destination" placeholder="Til, f.eks. JFK eller New York">
    <div class="airport-suggestions"></div>
  </div>
  <input type="date" name="start_date">
  <input type="date" name="end_date">
  <select name="cabin">
    <option>Any</option>
    <option>Economy</option>
    <option>Premium</option>
    <option>Business</option>
  </select>
  <input type="number" name="passengers" min="1" max="9" value="1">
  <label class="toggle"><input type="checkbox" name="direct_only"> Kun direkte</label>
  <label class="toggle"><input type="checkbox" name="include_nearby" checked> Sjekk gateway-byer også</label>
  <button type="submit">Finn tilgjengelige bonusseter</button>
  <a class="ghost-btn export-link" href="/export.csv">Eksporter CSV</a>
</form>
<p class="meta-line search-note">SAS-resultater hentes live fra SAS Award Finder beta-endepunkt. SkyTeam vises ikke som verifisert data i denne versjonen.</p>
